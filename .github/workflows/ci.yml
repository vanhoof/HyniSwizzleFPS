name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/.theos-toolchain
    steps:
      - uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Install Theos
        run: |
          set -euo pipefail
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS"
          echo "$THEOS/bin" >> "$GITHUB_PATH"

      - name: Build dylib
        run: make

      - name: Build smoke tests
        run: bash tests/check-build.sh

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: HyniSwizzleFPS.dylib
          path: build/HyniSwizzleFPS.dylib
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dylib artifact
        uses: actions/download-artifact@v4
        with:
          name: HyniSwizzleFPS.dylib
          path: build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/HyniSwizzleFPS.dylib
          generate_release_notes: true
          draft: false
          prerelease: false
